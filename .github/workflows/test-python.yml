name: Unit tests for Python based features

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  code-quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements/test-requirements.txt

      - name: Run flake8
        run: |
          source .venv/bin/activate
          flake8 ./linapy

      - name: Run mypy
        run: |
          source .venv/bin/activate
          mypy --config-file mypy.ini ./linapy

  test:
    runs-on: ubuntu-latest
    needs: code-quality-check

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements/test-requirements.txt

      - name: Run pytest
        run: |
          source .venv/bin/activate
          pytest
